name: Deploy
on: [push]
jobs:
    deploy_site1:
        runs-on: ubuntu-latest

        steps:
            -   name: checkout_site1
                uses: actions/checkout@v6

            -   name: docker_build
                run: docker build -t site1 ./site1
            
            -   name: docker_run
                run: docker run -d -p 8080:80 site1
            